version: 2

project_name: dujiao-next

before:
  hooks:
    - go mod tidy

builds:
  - id: api
    env:
      - CGO_ENABLED=0
    main: ./cmd/server
    binary: dujiao-next
    ldflags:
      - -s -w -X github.com/dujiao-next/internal/version.Version={{.Tag}}
    flags:
      - "-tags=release"
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

  # fullstack 二进制：embed admin + user SPA。仅 linux（小白单二进制部署目标）。
  # CI workflow 在 GoReleaser 之前 checkout admin/user 同 tag 源码、跑前端 build、
  # 把 dist 拷到 internal/web/dist/{admin,user}，再由 -tags=fullstack 触发 embed。
  - id: fullstack
    env:
      - CGO_ENABLED=0
    main: ./cmd/server
    binary: dujiao-server
    ldflags:
      - -s -w -X github.com/dujiao-next/internal/version.Version={{.Tag}}
    flags:
      - "-tags=release,fullstack"
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: api
    ids:
      - api
    formats: [tar.gz]
    files:
      - ./config.yml.example
      - ./README.md
    name_template: >-
      {{ .ProjectName }}_
      {{- .Tag }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

  - id: fullstack
    ids:
      - fullstack
    formats: [tar.gz]
    files:
      - ./config.yml.example
      - src: ./scripts/release-templates/README.md
        dst: README.md
      - src: ./scripts/release-templates/docker-compose.yml
        dst: docker-compose.yml
    name_template: >-
      dujiao-all_
      {{- .Tag }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-
    ---

    ## 📚 Documentation（在线文档）
    - [Installation Guide](https://dujiao-next.com/deploy/)
    - [部署指南](https://dujiao-next.com/deploy/)
